services:
  - type: web
    name: breachlens-api
    runtime: python
    plan: free
    region: oregon # Render free tier is often best in Oregon/Frankfurt
    branch: main   # Industry Standard: Only deploy to production from the main branch
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: run.py
      - key: SWAGGER_ENABLED
        value: "false"

      # FRONTEND (temporary backend-only mode supported)
      - key: FRONTEND_BASE_URL
        sync: false
      - key: FRONTEND_PENDING
        value: "true"

      # DATABASE & CACHING (Must be set in Render Dashboard)
      - key: MONGO_URI
        sync: false
      - key: RATELIMIT_STORAGE_URL
        sync: false
      - key: CACHE_REDIS_URL
        sync: false

      # SECURITY (Must be set in Render Dashboard)
      - key: SECRET_KEY
        sync: false
      - key: IP_ANONYMIZATION_SALT
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "Lax"
      - key: AUTH_COOKIE_DOMAIN
        sync: false
      - key: CSRF_ENABLED
        value: "true"
      - key: CSRF_COOKIE_NAME
        value: "bl_csrf"
      - key: CSRF_HEADER_NAME
        value: "X-CSRF-Token"
