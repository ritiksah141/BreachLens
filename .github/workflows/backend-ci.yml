name: Backend CI

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

# Cancel in-progress runs if a new push is made to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install flake8
      - name: Run Lint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r . -x ./tests,./venv

  test:
    name: Unit Tests (PyTest)
    runs-on: ubuntu-latest
    needs: [lint, security] # Only run tests if basic checks pass
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask pytest-cov mongomock
      - name: Run PyTest
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key # pragma: allowlist secret
          MONGO_URI: mongodb://localhost:27017/unused
        run: |
          pytest tests/test_exposure_logic.py --cov=app --cov-report=xml
      - name: Upload Coverage to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: backend/coverage.xml
